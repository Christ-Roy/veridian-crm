name: Veridian CRM — Build & Push Image (DEPRECATED)

# ⚠️ DÉPRÉCIÉ 2026-06-13 — fusionné dans `veridian-crm-ci.yaml` (job build-push).
# Le trigger `workflow_run` ne s'armait pas de façon fiable depuis staging
# (branche non-défaut) → chaîne ci→build→deploy cassée. Cf ticket #5 /
# todo/2026-06-11-piege-workflow-run-branche-non-defaut.md.
# Conservé en `workflow_dispatch` SEULEMENT comme filet de secours manuel
# (rebuild d'urgence d'une ref précise). À supprimer une fois le workflow
# unifié confirmé stable en prod.
#
# - Image runtime : multi-stage Dockerfile.veridian (server + front
#   bundlé), basée sur Node 24.15 Alpine, exposes :3000
# - Tags publiés : staging → :staging + :staging-<sha7> ; main → :latest + :<sha7>
# - Auth GHCR via GITHUB_TOKEN (permissions packages:write)

on:
  # Trigger auto `workflow_run` RETIRÉ (source du bug). Build auto = désormais
  # dans veridian-crm-ci.yaml. Ici : dispatch manuel uniquement.
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build (branch or SHA). Defaults to caller ref.'
        required: false
        default: ''

permissions:
  contents: read
  packages: write

concurrency:
  group: veridian-crm-build-image-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: true

jobs:
  build-push:
    name: Build & push veridian-crm image
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # Ne pas push d'image si le CI Veridian a échoué.
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    steps:
      - name: Determine ref to build
        id: ref
        run: |
          if [ -n "${{ github.event.inputs.ref }}" ]; then
            echo "ref=${{ github.event.inputs.ref }}" >> "$GITHUB_OUTPUT"
            echo "branch=${{ github.event.inputs.ref }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.event.workflow_run.head_sha }}" ]; then
            echo "ref=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
            echo "branch=${{ github.event.workflow_run.head_branch }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.ref }}" >> "$GITHUB_OUTPUT"
            echo "branch=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ steps.ref.outputs.ref }}
          fetch-depth: 1

      - name: Set up QEMU
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3.6.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Filet rollback prod : avant d'écraser :latest, l'actuelle est
      # re-taggée :rollback (manipulation de manifest GHCR, pas de pull).
      # Rollback = compose.update image :rollback + compose.deploy.
      - name: Retag current :latest as :rollback (main only)
        if: contains(steps.ref.outputs.branch, 'main')
        run: |
          IMG=ghcr.io/christ-roy/veridian-crm
          if docker buildx imagetools inspect "$IMG:latest" >/dev/null 2>&1; then
            docker buildx imagetools create -t "$IMG:rollback" "$IMG:latest"
            echo "retagged $IMG:latest -> $IMG:rollback"
          else
            echo "no :latest yet, skipping rollback tag"
          fi

      - name: Compute tags
        id: tags
        run: |
          BRANCH='${{ steps.ref.outputs.branch }}'
          SHA_SHORT=$(git rev-parse --short=7 HEAD)
          echo "sha_short=${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          IMG=ghcr.io/christ-roy/veridian-crm
          case "$BRANCH" in
            main|refs/heads/main)
              echo "tags=${IMG}:latest,${IMG}:${SHA_SHORT}" >> "$GITHUB_OUTPUT"
              ;;
            staging|refs/heads/staging)
              echo "tags=${IMG}:staging,${IMG}:staging-${SHA_SHORT}" >> "$GITHUB_OUTPUT"
              ;;
            *)
              # Manual dispatch sur autre ref : tag dédié pour éviter
              # d'écraser staging/latest accidentellement.
              SAFE_BRANCH=$(echo "$BRANCH" | tr '/' '-' | tr -cd 'A-Za-z0-9._-')
              echo "tags=${IMG}:${SAFE_BRANCH}-${SHA_SHORT}" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Build & push image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          file: ./Dockerfile.veridian
          target: veridian-crm
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            APP_VERSION=${{ steps.tags.outputs.sha_short }}
            VERIDIAN_BUILD_SHA=${{ github.sha }}
          cache-from: type=gha,scope=veridian-crm-${{ steps.ref.outputs.branch }}
          cache-to: type=gha,mode=max,scope=veridian-crm-${{ steps.ref.outputs.branch }}
          provenance: false

      - name: Summary
        run: |
          {
            echo "## Veridian CRM image published"
            echo ""
            echo "- Branch: \`${{ steps.ref.outputs.branch }}\`"
            echo "- SHA: \`${{ steps.tags.outputs.sha_short }}\`"
            echo "- Tags:"
            for t in $(echo "${{ steps.tags.outputs.tags }}" | tr ',' '\n'); do
              echo "  - \`$t\`"
            done
          } >> "$GITHUB_STEP_SUMMARY"

  # Étage 2 — scan vulnérabilités de l'image publiée.
  # V1 : mode RAPPORT (exit-code 0) — le fork hérite des CVE upstream Twenty,
  # un mode bloquant serait rouge en permanence sans triage préalable.
  # Passage en bloquant (CRITICAL,HIGH) après triage initial — suivre dans
  # VERIDIAN-PATCHES.md / todo.
  trivy-scan:
    name: Trivy image scan (report)
    runs-on: ubuntu-latest
    needs: build-push
    timeout-minutes: 15
    steps:
      - name: Determine image tag to scan
        id: img
        run: |
          BRANCH='${{ github.event.workflow_run.head_branch || github.ref_name }}'
          case "$BRANCH" in
            *main*)    echo "tag=latest"  >> "$GITHUB_OUTPUT" ;;
            *staging*) echo "tag=staging" >> "$GITHUB_OUTPUT" ;;
            *)         echo "tag=staging" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Run Trivy on published image
        uses: aquasecurity/trivy-action@dc5a429b52fcf669ce959baa2c2dd26090d2a6c4 # 0.32.0
        with:
          image-ref: ghcr.io/christ-roy/veridian-crm:${{ steps.img.outputs.tag }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: '0'
          ignore-unfixed: true
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
